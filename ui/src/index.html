<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Chromazen Controls</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <main>
      <section aria-labelledby="brush-heading">
        <h2 id="brush-heading">Brush</h2>
        <label class="select-row">
          <span class="visually-hidden">Preset</span>
          <select id="brush-preset"></select>
        </label>
        <label class="color-row">
          <span id="color-label">Color</span>
          <input id="paint-color" type="color" value="#aabbcc" />
        </label>
        <label class="range-row">
          <span class="control-title">
            <span>Size</span>
            <output id="size-output">—</output>
          </span>
          <input id="brush-size" type="range" min="1" max="2000" value="300" />
        </label>
        <label class="range-row">
          <span class="control-title">
            <span>Smoothing</span>
            <output id="smoothing-output">—</output>
          </span>
          <input
            id="smoothing"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.8"
          />
        </label>
      </section>

      <section class="layers-section" aria-labelledby="layers-heading">
        <div class="section-title">
          <h2 id="layers-heading">Layers</h2>
          <div class="compact-actions">
            <button id="add-layer" type="button" aria-label="Add layer">
              +
            </button>
            <button
              id="delete-layer"
              type="button"
              aria-label="Delete selected layer"
            >
              −
            </button>
          </div>
        </div>
        <div
          id="layers"
          class="layers"
          role="listbox"
          aria-label="Canvas layers"
        ></div>
      </section>
    </main>
  </body>
</html>
