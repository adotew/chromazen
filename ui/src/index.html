<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Chromazen Controls</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <main>
      <header class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>Chromazen</h1>
          <p>Native canvas</p>
        </div>
      </header>

      <section aria-labelledby="tools-heading">
        <h2 id="tools-heading">Tool</h2>
        <div class="segmented" id="tools">
          <button data-tool="brush" type="button">Brush <kbd>B</kbd></button>
          <button data-tool="eraser" type="button">Eraser <kbd>E</kbd></button>
          <button data-tool="smudge" type="button">Smudge <kbd>S</kbd></button>
        </div>
      </section>

      <section aria-labelledby="brush-heading">
        <div class="section-title">
          <h2 id="brush-heading">Brush</h2>
          <span id="size-output">—</span>
        </div>
        <label>
          <span>Preset</span>
          <select id="brush-preset"></select>
        </label>
        <label class="color-row">
          <span id="color-label">Color</span>
          <input id="paint-color" type="color" value="#aabbcc" />
        </label>
        <label>
          <span>Size</span>
          <input id="brush-size" type="range" min="1" max="2000" value="300" />
        </label>
        <label>
          <span>Smoothing</span>
          <input id="smoothing" type="range" min="0" max="1" step="0.01" value="0.8" />
        </label>
      </section>

      <section aria-labelledby="history-heading">
        <h2 id="history-heading">Canvas</h2>
        <div class="button-row">
          <button id="undo" type="button">Undo</button>
          <button id="redo" type="button">Redo</button>
          <button id="fit" type="button">Fit</button>
        </div>
      </section>

      <section class="layers-section" aria-labelledby="layers-heading">
        <div class="section-title">
          <h2 id="layers-heading">Layers</h2>
          <div class="compact-actions">
            <button id="add-layer" type="button" aria-label="Add layer">+</button>
            <button id="delete-layer" type="button" aria-label="Delete selected layer">−</button>
          </div>
        </div>
        <div id="layers" class="layers" role="listbox" aria-label="Canvas layers"></div>
      </section>

      <section class="settings" aria-labelledby="settings-heading">
        <h2 id="settings-heading">Settings</h2>
        <div class="button-row">
          <button id="save-settings" type="button">Save</button>
          <button id="reload-settings" type="button">Reload</button>
          <button id="reset-brush" type="button">Reset brush</button>
        </div>
        <p id="message" class="message" hidden></p>
      </section>
    </main>
  </body>
</html>
